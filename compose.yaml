services:
  kaimier-site:
    build:
      context: ./apps/kaimier-site
      dockerfile: Dockerfile
    container_name: kaimier-site
    restart: unless-stopped
    ports:
      - "3001:80"

  kapis-platform:
    build:
      context: ./apps/kapis-platform
      dockerfile: Dockerfile
    container_name: kapis-platform
    restart: unless-stopped
    ports:
      - "3002:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaimier-backend
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: kaimier-nginx
    restart: unless-stopped
    depends_on:
      - kaimier-site
      - kapis-platform
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/local:/etc/nginx/local:ro
      - ./nginx/prod:/etc/nginx/prod:ro
