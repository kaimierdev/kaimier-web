services:
  kaimier-site:
    build:
      context: ./apps/kaimier-site
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"

  kapis-platform:
    build:
      context: ./apps/kapis-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:80"

  kaimier-admin:
    build:
      context: ./apps/kaimier-admin
      dockerfile: Dockerfile
      args:
        VITE_BASE: /admin/
    restart: unless-stopped
    ports:
      - "3003:80"

  api-springboot:
    build:
      context: ./backend/springboot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
    ports:
      - "8080:8080"

  # api-fastapi:
  #   build:
  #     context: ./backend/fastapi
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - kaimier-site
      - kapis-platform
      - kaimier-admin
      - api-springboot
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/local:/etc/nginx/local:ro
      - ./nginx/prod:/etc/nginx/prod:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
