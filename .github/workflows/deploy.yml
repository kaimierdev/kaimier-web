name: Deploy to Tencent Lighthouse 部署到腾讯云轻量服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 先探测端口：若此处失败 = 安全组/防火墙/公网 IP 不对，与密钥无关
      - name: Check SSH port reachable from GitHub
        env:
          HOST: ${{ secrets.TCLOUD_HOST }}
          PORT: ${{ secrets.TCLOUD_PORT || '22' }}
        run: |
          set -e
          if [ -z "$HOST" ]; then
            echo "::error::Secret TCLOUD_HOST is empty"
            exit 1
          fi
          echo "Probing TCP $HOST:$PORT ..."
          python3 - <<'PY'
          import os, socket, sys
          host = os.environ["HOST"]
          port = int(os.environ["PORT"])
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(15)
          try:
              s.connect((host, port))
              print("TCP OK:", host, port)
          except Exception as e:
              print("::error::Cannot connect to", host, port, "-", e)
              print("Check: Tencent security group allows inbound TCP", port, "from 0.0.0.0/0")
              sys.exit(1)
          finally:
              s.close()
          PY

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TCLOUD_HOST }}
          username: ${{ secrets.TCLOUD_USER }}
          key: ${{ secrets.TCLOUD_SSH_KEY }}
          port: ${{ secrets.TCLOUD_PORT || '22' }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            if [ ! -d "${{ secrets.DEPLOY_PATH }}/.git" ]; then
              mkdir -p "${{ secrets.DEPLOY_PATH }}"
              git clone "${{ secrets.REPO_SSH_URL }}" "${{ secrets.DEPLOY_PATH }}"
            fi
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose down --remove-orphans || true
            OLD_8080_CONTAINERS="$(docker ps -q --filter publish=8080)"
            if [ -n "$OLD_8080_CONTAINERS" ]; then
              docker rm -f $OLD_8080_CONTAINERS
            fi
            docker compose up -d --build --remove-orphans
            docker image prune -f
