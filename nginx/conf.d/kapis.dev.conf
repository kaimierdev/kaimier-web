upstream kapis_platform_upstream {
  server kapis-platform:80;
}

upstream backend_upstream {
  server kaimier-backend:8080;
}

server {
  listen 80;
  server_name kapis.dev www.kapis.dev local.kapis.dev;

  include /etc/nginx/local/gateway.conf;

  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://kapis_platform_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
