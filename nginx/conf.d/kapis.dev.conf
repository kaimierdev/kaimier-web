upstream kapis_platform_upstream {
  server kapis-platform:80;
}

upstream backend_upstream {
  server kaimier-backend:8080;
}

server {
  listen 80;
  server_name kapis.dev www.kapis.dev;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name kapis.dev www.kapis.dev;

  ssl_certificate /etc/letsencrypt/live/kapis.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kapis.dev-0001/privkey.pem;

  include /etc/nginx/local/gateway.conf;

  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://kapis_platform_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
